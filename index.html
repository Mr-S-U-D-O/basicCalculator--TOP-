<!doctype html>
<html lang="en-ZA">
  <head>
    <!-- Core Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <title>Basic Calculator | The Odin Project</title>
    <meta name="description" content="Enter description here" />
    <meta name="robots" content="index, follow" />
    <!-- Browser Theme Color (Matches --primary-color) -->
    <meta name="theme-color" content="var(--primary-color)" />

    <!-- Social Meta (Commented out - Un-comment when ready) -->
    <!-- <meta property="og:title" content="Page Title"> -->
    <!-- <meta property="og:description" content="Enter description here"> -->
    <!-- <meta property="og:image" content="assets/og-image.png"> -->
    <!-- <meta property="og:url" content="https://yourdomain.com"> -->
    <!-- <meta name="twitter:card" content="summary_large_image"> -->

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="header-container">
      <div class="heading-container">
        <span class="sub-heading">Basic calculator by....</span>
        <h1 class="heading">Mr-S.U.D.O</h1>
      </div>
    </header>

    <!-- Main Calculator Section -->
    <main class="main-container">
      <!-- Number Pad Section -->
      <div class="numberpad-container">
        <div class="row-numberedpad-container">
          <button type="button" class="btn calc-btn seven">7</button>
          <button type="button" class="btn calc-btn four">4</button>
          <button type="button" class="btn calc-btn one">1</button>
          <button type="button" class="btn calc-btn clearBtn">clear</button>
        </div>
        <div class="row-numberedpad-container">
          <button type="button" class="btn calc-btn eight">8</button>
          <button type="button" class="btn calc-btn five">5</button>
          <button type="button" class="btn calc-btn two">2</button>
          <button type="button" class="btn calc-btn zero">0</button>
        </div>
        <div class="row-numberedpad-container">
          <button type="button" class="btn calc-btn nine">9</button>
          <button type="button" class="btn calc-btn six">6</button>
          <button type="button" class="btn calc-btn three">3</button>
          <button type="button" class="btn calc-btn backBtn">back</button>
        </div>
      </div>

      <!-- Display + Operators Section -->
      <div class="display-and-operator-container">
        <div class="calcu-display-screens">
          <div class="variables-half calcu-display-half">
            <span class="firstNumberInDisplay">10</span>
            <span class="signInDisplay">+</span>
            <span class="secondNumberInDisplay">9</span>
          </div>

          <div class="answer-half calcu-display-half">
            <span class="equalsToSignInDisplay">=</span>
            <span class="answerSignInDisplay">19</span>
          </div>
        </div>
        <div class="arithmetic-btn-container">
          <div class="operator-btns-containers">
            <div class="operator-btn-container">
              <button type="button" class="btn calc-sign-btn">+</button>
              <button type="button" class="btn calc-sign-btn">-</button>
              <button type="button" class="btn calc-sign-btn">x</button>
            </div>
            <div class="operator-btn-container">
              <button type="button" class="btn calc-sign-btn">/</button>
              <button type="button" class="btn calc-sign-btn">%</button>
              <button type="button" class="btn calc-sign-btn">**</button>
            </div>
          </div>
          <div class="equals-to-btn-container">
            <button type="button" class="btn calc-equals-to-sign-btn">=</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer Section -->
    <footer class="footer-container"></footer>

    <!-- Scripts -->
    <script src="javascript/global.js" defer></script>
    <script src="javascript/index.js" defer></script>
  </body>
</html>
