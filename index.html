<!doctype html>
<html lang="en-ZA">
  <head>
    <!-- Core Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <title>Basic Calculator | The Odin Project</title>
    <meta name="description" content="Enter description here" />
    <meta name="robots" content="index, follow" />
    <!-- Browser Theme Color (Matches --primary-color) -->
    <meta name="theme-color" content="var(--primary-color)" />

    <!-- Social Meta (Commented out - Un-comment when ready) -->

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="header-container">
      <div class="heading-container">
        <span class="sub-heading">Basic calculator by....</span>
        <h1 class="heading">Mr-S.U.D.O</h1>
      </div>
    </header>

    <!-- Main Calculator Section -->
    <main class="main-container">
      <!-- Number Pad Section -->
      <div class="numberpad-container">
        <div class="row-numberedpad-container">
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn hide-btn"></button>
        </div>
        <div class="row-numberedpad-container">
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn zero-calc-btn"></button>
        </div>
        <div class="row-numberedpad-container">
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn"></button>
          <button type="button" class="calc-btn hide-btn"></button>
        </div>
      </div>

      <!-- Display + Operators Section -->
      <div class="display-and-operator-container">
        <div class="calcu-display-screens"></div>
        <div class="arithmatic-btn-container">
          <div class="concatinator-btns-containers"></div>
          <div class="equals-to-btn-container"></div>
        </div>
      </div>
    </main>

    <!-- Footer Section -->
    <footer class="footer-container"></footer>

    <!-- Scripts -->
    <script src="javascript/global.js" defer></script>
    <script src="javascript/index.js" defer></script>
  </body>
</html>
